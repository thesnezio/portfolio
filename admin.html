<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Youssef Nejjar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --accent: #6C63FF;
    --accent-light: #ede9fe;
    --danger: #e24b4a;
    --success: #1d9e75;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --sidebar-w: 220px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

  /* Login Screen */
  #loginScreen {
    position: fixed; inset: 0; background: linear-gradient(135deg, #1a1a2e, #16213e);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .login-box {
    background: white; border-radius: 16px; padding: 2.5rem; width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .login-box h1 { font-size: 1.5rem; margin-bottom: 0.3rem; color: var(--text); }
  .login-box p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .login-box input {
    width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border);
    border-radius: 8px; font-size: 1rem; margin-bottom: 1rem; outline: none;
    transition: border-color 0.2s;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box button {
    width: 100%; padding: 0.9rem; background: var(--accent); color: white;
    border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer;
  }
  #loginError { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; display: none; }

  /* Sidebar */
  #sidebar {
    width: var(--sidebar-w); background: #1a1a2e; color: white;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 100;
  }
  .sidebar-logo {
    padding: 1.5rem; display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .logo-circle { width: 36px; height: 36px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.9rem; }
  .sidebar-nav { flex: 1; padding: 1rem 0; }
  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 0.75rem 1.5rem;
    cursor: pointer; font-size: 0.9rem; color: rgba(255,255,255,0.7);
    transition: all 0.2s; border-left: 3px solid transparent;
  }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: white; }
  .nav-item.active { background: rgba(108,99,255,0.2); color: white; border-left-color: var(--accent); }
  .logout-btn {
    width: calc(100% - 2rem); padding: 0.6rem; background: rgba(226,75,74,0.2); color: #f09595;
    border: 1px solid rgba(226,75,74,0.3); border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    margin: 1rem;
  }

  /* Main */
  #main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
  .topbar {
    background: white; padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10;
  }
  .content { padding: 2rem; flex: 1; }

  /* Panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* Cards */
  .card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; }
  .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }

  /* Form */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }
  input, textarea, select {
    padding: 0.7rem 0.9rem; border: 1px solid var(--border); border-radius: 8px;
    font-size: 0.9rem; background: var(--bg); outline: none;
  }
  
  /* Upload Area */
  .upload-wrapper { display: flex; gap: 0.5rem; }
  .upload-wrapper input[type="text"] { flex: 1; }
  .upload-btn-label { 
    background: var(--accent-light); color: var(--accent); padding: 0.7rem 1rem; 
    border-radius: 8px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-btn-label:hover { background: var(--accent); color: white; }
  input[type="file"] { display: none; }

  /* Buttons */
  .btn { padding: 0.65rem 1.2rem; border-radius: 8px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-success { background: var(--success); color: white; }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

  /* List */
  .item-row {
    background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; display: flex; align-items: center; gap: 1rem; margin-bottom: 0.5rem;
  }
  .item-row img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #eee; }
  .item-row-body { flex: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500;
    display: flex; align-items: center; justify-content: center; display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 16px; padding: 2rem; width: 600px; max-height: 90vh; overflow-y: auto; }
  
  .lang-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
  .lang-tab { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); transition: all 0.2s; }
  .lang-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  #toast {
    position: fixed; bottom: 2rem; right: 2rem; padding: 1rem 1.5rem;
    border-radius: 10px; font-size: 0.9rem; font-weight: 500; z-index: 9999;
    transform: translateY(100px); opacity: 0; transition: all 0.3s;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { background: var(--success); color: white; }
  #toast.error { background: var(--danger); color: white; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h1>🔐 Admin Panel</h1>
    <p>Sign in to manage your portfolio</p>
    <input type="email" id="loginEmail" placeholder="Email address">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="doLogin()">Sign In</button>

</div>

<div id="sidebar">

    <div id="nav-certifications" class="nav-item" onclick="showPanel('certifications')">📜<span>Certifications</span></div>
  </nav>
  <button class="logout-btn" onclick="doLogout()">Sign Out</button>
</div>

<div id="main">
  <div class="topbar"><h2 id="topbarTitle">Hero / Bio</h2><span class="user-badge" id="userBadge">...</span></div>
  <div class="content">

            <div class="form-group"><label>Subtitle (EN)</label><input id="h_subtitle_en"></div>
            <div class="form-group full"><label>Bio (EN)</label><textarea id="h_bio_en"></textarea></div>

    </div>

    <!-- LIST PANELS -->
    <div class="panel" id="panel-experience">
      <div class="card"><div class="card-header"><h3>Experience</h3><button class="btn btn-primary" onclick="openModal('experience')">+ Add Experience</button></div><div id="list-experience"></div></div>

    <div class="panel" id="panel-education">

<div class="modal-overlay" id="modalOverlay">

      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveModal()">Save Changes</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const SUPABASE_URL = 'https://qqfiuagvlerrsvtifcuo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_4YWkhBi8PRcsyi947Kdqkg_wQcjgR4g';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentPanel = 'hero';
let currentHeroId = null;
let editingId = null;
let editingTable = null;

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (session) showApp(session.user);
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) { 
    document.getElementById('loginError').textContent = error.message; 
    document.getElementById('loginError').style.display='block'; 
    return; 
  }
  showApp(data.user);
}

function doLogout() { db.auth.signOut().then(() => location.reload()); }

function showApp(user) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('userBadge').textContent = user.email;
  loadHero();
}

function showPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  document.getElementById('topbarTitle').textContent = name.charAt(0).toUpperCase() + name.slice(1);
  if (name !== 'hero') loadList(name);
}

function switchLangTab(el, prefix, lang) {
  const container = el.closest('.modal, .card');
  container.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  container.querySelectorAll(`[id^="${prefix}-"]`).forEach(b => b.style.display = 'none');
  const target = container.querySelector(`#${prefix}-${lang}`);
  if(target) target.style.display = 'block';
}

async function uploadImage(input, targetId) {
  const file = input.files[0];
  if (!file) return;
  
  // Clean file name
  const fileExt = file.name.split('.').pop();
  const fileName = `${Date.now()}.${fileExt}`;
  const filePath = `uploads/${fileName}`;
  
  showToast('Uploading image...', 'success');
  
  const { data, error } = await db.storage.from('portfolio').upload(filePath, file);
  
  if (error) { 
    console.error("Upload error:", error);
    showToast('Upload failed: ' + error.message, 'error'); 
    return; 
  }
  
  const { data: { publicUrl } } = db.storage.from('portfolio').getPublicUrl(filePath);
  
  const inputEl = document.getElementById(targetId);
  if (inputEl) {
    inputEl.value = publicUrl;
    showToast('Image uploaded successfully!', 'success');
  }
}

async function loadHero() {
  const { data, error } = await db.from('hero').select('*').limit(1).single();
  if (error || !data) return;
  
  currentHeroId = data.id;
  const fields = ['name_en','name_fr','name_ar','subtitle_en','subtitle_fr','subtitle_ar','bio_en','bio_fr','bio_ar','location_en','location_fr','location_ar','photo_url','phone','email','linkedin'];
  fields.forEach(k => { 
    const el = document.getElementById('h_'+k);
    if(el) el.value = data[k] || ''; 
  });
}

async function saveHero() {
  if (!currentHeroId) {
    showToast('Error: No hero ID found', 'error');
    return;
  }
  
  const payload = {};
  const fields = ['name_en','name_fr','name_ar','subtitle_en','subtitle_fr','subtitle_ar','bio_en','bio_fr','bio_ar','location_en','location_fr','location_ar','photo_url','phone','email','linkedin'];
  fields.forEach(k => {
    const el = document.getElementById('h_'+k);
    if(el) payload[k] = el.value;
  });

  const { error } = await db.from('hero').update(payload).eq('id', currentHeroId);
  if (error) {
    showToast(error.message, 'error');
  } else {
    showToast('Hero section updated!', 'success');
  }
}

async function loadList(table) {
  const container = document.getElementById('list-' + table);
  container.innerHTML = '<p style="padding:1rem;color:var(--muted)">Loading items...</p>';
  
  const { data, error } = await db.from(table).select('*').order('sort_order', { ascending: true });
  
  if (error) {
    container.innerHTML = `<p style="padding:1rem;color:var(--danger)">Error loading list: ${error.message}</p>`;
    return;
  }

  if (data.length === 0) {
    container.innerHTML = '<p style="padding:2rem;text-align:center;color:var(--muted)">No items found. Click "+ Add" to create one.</p>';
    return;
  }

  container.innerHTML = data.map(row => `
    <div class="item-row">
      <img src="${row.image_url || row.photo_url || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
      <div class="item-row-body">
        <strong>${row.title_en || row.degree_en || 'Untitled'}</strong><br>
        <small>${row.org_en || ''}</small>
      </div>
      <div style="display:flex; gap:0.5rem">
        <button class="btn btn-ghost" onclick="openModal('${table}', '${row.id}')">Edit</button>
        <button class="btn btn-danger" onclick="deleteRow('${table}', '${row.id}')">Delete</button>
      </div>
    </div>`).join('');
}

    <div class="form-group"><label>Sort Order</label><input type="number" id="m_sort_order" value="${d.sort_order||0}"></div>`,

  certifications: (d={}) => `

      <span class="lang-tab active" onclick="switchLangTab(this, 'm-lang', 'en')">EN</span>
      <span class="lang-tab" onclick="switchLangTab(this, 'm-lang', 'fr')">FR</span>
      <span class="lang-tab" onclick="switchLangTab(this, 'm-lang', 'ar')">AR</span>
    </div>
    <div id="m-lang-en">
      <div class="form-grid">
        <div class="form-group"><label>Title (EN)</label><input id="m_title_en" value="${d.title_en||''}"></div>
        <div class="form-group"><label>Org (EN)</label><input id="m_org_en" value="${d.org_en||''}"></div>
      </div>
    </div>
    <div id="m-lang-fr" style="display:none">
      <div class="form-grid">
        <div class="form-group"><label>Title (FR)</label><input id="m_title_fr" value="${d.title_fr||''}"></div>
        <div class="form-group"><label>Org (FR)</label><input id="m_org_fr" value="${d.org_fr||''}"></div>
      </div>
    </div>
    <div id="m-lang-ar" style="display:none">
      <div class="form-grid">
        <div class="form-group"><label>Title (AR)</label><input id="m_title_ar" value="${d.title_ar||''}" dir="rtl"></div>
        <div class="form-group"><label>Org (AR)</label><input id="m_org_ar" value="${d.org_ar||''}" dir="rtl"></div>
      </div>
    </div>
    <div class="form-group"><label>Icon (Emoji Default)</label><input id="m_icon" value="${d.icon||'📜'}"></div>
    <div class="form-group"><label>Sort Order</label><input type="number" id="m_sort_order" value="${d.sort_order||0}"></div>`
};

async function openModal(table, id=null) {
  editingId = id; 
  editingTable = table;
  document.getElementById('modalTitle').textContent = (id ? 'Edit ' : 'Add ') + table.charAt(0).toUpperCase() + table.slice(1);
  
  let data = {};
  if (id) { 
    const { data: row, error } = await db.from(table).select('*').eq('id', id).single(); 
    if (error) { showToast("Error loading item: " + error.message, "error"); return; }
    data = row; 
  }
  
  document.getElementById('modalBody').innerHTML = modalForms[table](data);
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() { 
  document.getElementById('modalOverlay').classList.remove('open'); 
  editingId = null; 
}

async function saveModal() {
  const t = editingTable;
  const payload = { sort_order: parseInt(document.getElementById('m_sort_order').value) || 0 };
  
  const getVal = id => {
    const el = document.getElementById(id);
    return el ? el.value : null;
  };

  if (t === 'experience') {
    ['title_en','title_fr','title_ar','org_en','org_fr','org_ar','date_en','date_fr','date_ar','desc_en','desc_fr','desc_ar','image_url'].forEach(k => payload[k] = getVal('m_'+k));
  } else if (t === 'education') {
    ['degree_en','degree_fr','degree_ar','org_en','org_fr','org_ar','date_en','date_fr','date_ar','image_url'].forEach(k => payload[k] = getVal('m_'+k));
  } else if (t === 'certifications') {
    ['title_en','title_fr','title_ar','org_en','org_fr','org_ar','icon','image_url'].forEach(k => payload[k] = getVal('m_'+k));
  }

  const { error } = editingId 
    ? await db.from(t).update(payload).eq('id', editingId) 
    : await db.from(t).insert([payload]);
    
  if (error) { 
    showToast(error.message, 'error'); 
  } else {
    showToast('Saved successfully!', 'success'); 
    closeModal(); 
    loadList(t);
  }
}

async function deleteRow(table, id) {
  if (!confirm('Are you sure you want to delete this item?')) return;
  const { error } = await db.from(table).delete().eq('id', id);
  if (error) {
    showToast(error.message, 'error');
  } else {
    showToast('Item deleted', 'success');
    loadList(table);
  }
}

function showToast(m, type) {
  const t = document.getElementById('toast'); 
  t.textContent = m; 
  t.className = 'show ' + type;
  setTimeout(() => t.className = '', 3000);
}

init();
</script>
</body>
</html>
